services:
  # Application setup
  api:
    build:
      context: ../
      dockerfile: server/infra/Dockerfile
    ports:
      - '6969:6969'
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - skribbl

  # Redis setup
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skribbl

volumes:
  redis_data:

networks:
  skribbl:
    driver: bridge
